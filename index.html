<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leaflets — interactive map</title>

  <!-- Mapbox GL -->
  <link rel="stylesheet" href="https://api.mapbox.comgl.css
  <script src="https://api.mapbox.com/v3.21.0/mapbox-gl.js</script>

  <!-- Mapbox Geocoder -->
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css" type="text/css">
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { position: absolute; inset: 0; }

    .mapboxgl-popup-content {
      font: 13px/18px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      max-width: 320px;
    }

    /* Optional: make geocoder a bit wider on desktop */
    .mapboxgl-ctrl-geocoder {
      min-width: 260px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    mapboxgl.accessToken = "pk.eyJ1Ijoic2lyZHVubmVycyIsImEiOiJjbW9ia3FkdDcwMmFoMndzNnp0NG8xZjVqIn0.b5r1Fek9EvNWvmBF1GQpOA";

    const STYLE_URL = "mapbox://styles/sirdunners/cmobl8jze002p01r15jkw739u";
    const STREET_LAYER_ID = "Introduction Leaflet";
    const HIGHLIGHT_LAYER_ID = "Street Highlight";

    const map = new mapboxgl.Map({
      container: "map",
      style: STYLE_URL,
      center: [-1.7211, 51.5718],
      zoom: 11.13
    });

    map.addControl(new mapboxgl.NavigationControl(), "top-right");

    function setHighlightByStreetName(streetName) {
      if (!streetName) return;
      if (!map.getLayer(HIGHLIGHT_LAYER_ID)) return;
      map.setFilter(HIGHLIGHT_LAYER_ID, ["==", ["get", "Street Name"], streetName]);
    }

    function clearHighlight() {
      if (!map.getLayer(HIGHLIGHT_LAYER_ID)) return;
      map.setFilter(HIGHLIGHT_LAYER_ID, ["==", ["get", "Street Name"], "__none__"]);
    }

    function openPopupAt(lngLat, props) {
      const street = props["Street Name"] || props["name"] || "(street)";
      const status = props["Status"] || "";
      const recency = props["Recency Traffic Light"] || "";
      const ward = props["Ward"] || "";
      const constituency = props["Constituency"] || "";

      // Support both possible date fields
      const lastDate =
        props["Last Delivery Date (Display)"] ||
        props["Last Delivery Date"] ||
        "";

      new mapboxgl.Popup()
        .setLngLat(lngLat)
        .setHTML(`
          <strong>${street}</strong><br/>
          Status: ${status}<br/>
          Recency: ${recency}<br/>
          Ward: ${ward}<br/>
          Constituency: ${constituency}<br/>
          Last delivery: ${lastDate}
        `)
        .addTo(map);
    }

    map.on("load", () => {
      // Debug sanity checks (remove later if you like)
      console.log("mapboxgl:", typeof mapboxgl);
      console.log("MapboxGeocoder:", typeof MapboxGeocoder);

      const hasStreetLayer = !!map.getLayer(STREET_LAYER_ID);

      if (!hasStreetLayer) {
        console.warn("Layer not found:", STREET_LAYER_ID);
        console.log("Available layer IDs:", map.getStyle().layers.map(l => l.id));
      }

      // Add highlight layer above the street layer (if street layer exists)
      if (hasStreetLayer && !map.getLayer(HIGHLIGHT_LAYER_ID)) {
        const baseLayer = map.getLayer(STREET_LAYER_ID);
        const src = baseLayer.source;
        const srcLayer = baseLayer["source-layer"]; // only exists for vector tilesets

        const highlightLayerDef = {
          id: HIGHLIGHT_LAYER_ID,
          type: "line",
          source: src,
          ...(srcLayer ? { "source-layer": srcLayer } : {}),
          paint: {
            // bright cyan = very visible + colour-blind friendly
            "line-color": "#00E5FF",
            "line-width": 7,
            "line-opacity": 0.95
          },
          // start hidden
          filter: ["==", ["get", "Street Name"], "__none__"]
        };

        // Add ABOVE the base street layer so it sits on top
        map.addLayer(highlightLayerDef, STREET_LAYER_ID);
      }

      // Click popup + highlight
      if (hasStreetLayer) {
        map.on("click", STREET_LAYER_ID, (e) => {
          const f = e.features && e.features[0];
          if (!f) return;

          const p = f.properties || {};
          const streetName = p["Street Name"] || p["name"] || "";
          setHighlightByStreetName(streetName);
          openPopupAt(e.lngLat, p);
        });

        map.on("mouseenter", STREET_LAYER_ID, () => map.getCanvas().style.cursor = "pointer");
        map.on("mouseleave", STREET_LAYER_ID, () => map.getCanvas().style.cursor = "");
      }

      // If geocoder isn't available, don't crash the map
      if (typeof MapboxGeocoder === "undefined") {
        console.error("MapboxGeocoder is undefined — geocoder plugin script did not load.");
        return;
      }

      // Local-only street search (search within rendered street features)
      const geocoder = new MapboxGeocoder({
        accessToken: mapboxgl.accessToken,
        mapboxgl,
        marker: false,
        placeholder: "Search for a street…",
        localGeocoderOnly: true,
        localGeocoder: (query) => {
          if (!hasStreetLayer) return [];

          const features = map.queryRenderedFeatures({ layers: [STREET_LAYER_ID] });
          const seen = new Set();

          return features
            .filter(f => f.properties && f.properties["Street Name"])
            .filter(f => {
              const name = f.properties["Street Name"];
              if (seen.has(name)) return false;
              seen.add(name);
              return name.toLowerCase().includes(query.toLowerCase());
            })
            .map(f => ({
              type: "Feature",
              place_name: f.properties["Street Name"],
              properties: f.properties,
              // choose a midpoint-ish coordinate for lines
              center:
                f.geometry.type === "LineString"
                  ? f.geometry.coordinates[Math.floor(f.geometry.coordinates.length / 2)]
                  : f.geometry.coordinates
            }));
        },
        zoom: 17
      });

      map.addControl(geocoder, "top-left");

      // When a search result is selected: highlight + popup
      geocoder.on("result", (e) => {
        const p = e.result.properties || {};
        const center = e.result.center;

        const streetName = p["Street Name"] || "";
        setHighlightByStreetName(streetName);
        openPopupAt(center, p);
      });

      // When the search box is cleared: remove highlight
      geocoder.on("clear", () => {
        clearHighlight();
      });
    });
  </script>
</body>
</html>
``
