<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leaflets — interactive map</title>

  <!-- Mapbox GL -->
  https://api.mapbox.com/mapbox-gl-js/v3.21.0/mapbox-gl.css
  https://api.mapbox.com/mapbox-gl-js/v3.21.0/mapbox-gl.js</script>

  <!-- Mapbox Geocoder -->
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css" />
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { position: absolute; inset: 0; }
    .mapboxgl-popup-content {
      font: 13px/18px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      max-width: 320px;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    mapboxgl.accessToken = "pk.eyJ1Ijoic2lyZHVubmVycyIsImEiOiJjbW9ia3FkdDcwMmFoMndzNnp0NG8xZjVqIn0.b5r1Fek9EvNWvmBF1GQpOA";

    const STYLE_URL = "mapbox://styles/sirdunners/cmobl8jze002p01r15jkw739u";
    const STREET_LAYER_ID = "Introduction Leaflet";

    const map = new mapboxgl.Map({
      container: "map",
      style: STYLE_URL,
      center: [-1.7211, 51.5718],
      zoom: 11.13
    });

    map.addControl(new mapboxgl.NavigationControl(), "top-right");

    map.on("load", () => {
      // Debug: prove libraries loaded
      console.log("mapboxgl:", typeof mapboxgl);
      console.log("MapboxGeocoder:", typeof MapboxGeocoder);

      const hasStreetLayer = !!map.getLayer(STREET_LAYER_ID);
      if (!hasStreetLayer) {
        console.warn("Layer not found:", STREET_LAYER_ID);
        console.log("Available layer IDs:", map.getStyle().layers.map(l => l.id));
      }

      // Click popup (only if the layer exists)
      if (hasStreetLayer) {
        map.on("click", STREET_LAYER_ID, (e) => {
          const f = e.features && e.features[0];
          if (!f) return;

          const p = f.properties || {};
          const street = p["Street Name"] || p["name"] || "(street)";
          const status = p["Status"] || "";
          const recency = p["Recency Traffic Light"] || "";
          const ward = p["Ward"] || "";
          const constituency = p["Constituency"] || "";
          const lastDate = p["Last Delivery Date (Display)"] || p["Last Delivery Date"] || "";

          new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`
              <strong>${street}</strong><br/>
              Status: ${status}<br/>
              Recency: ${recency}<br/>
              Ward: ${ward}<br/>
              Constituency: ${constituency}<br/>
              Last delivery: ${lastDate}
            `)
            .addTo(map);
        });

        map.on("mouseenter", STREET_LAYER_ID, () => map.getCanvas().style.cursor = "pointer");
        map.on("mouseleave", STREET_LAYER_ID, () => map.getCanvas().style.cursor = "");
      }

      // If geocoder failed to load, don't crash the map
      if (typeof MapboxGeocoder === "undefined") {
        console.error("MapboxGeocoder is undefined — geocoder plugin script did not load.");
        return;
      }

      // Local-only street search (uses rendered street features)
      const geocoder = new MapboxGeocoder({
        accessToken: mapboxgl.accessToken,
        mapboxgl,
        marker: false,
        placeholder: "Search for a street…",
        localGeocoderOnly: true,
        localGeocoder: (query) => {
          if (!hasStreetLayer) return [];

          const features = map.queryRenderedFeatures({ layers: [STREET_LAYER_ID] });

          const seen = new Set();
          return features
            .filter(f => f.properties && f.properties["Street Name"])
            .filter(f => {
              const name = f.properties["Street Name"];
              if (seen.has(name)) return false;
              seen.add(name);
              return name.toLowerCase().includes(query.toLowerCase());
            })
            .map(f => ({
              type: "Feature",
              place_name: f.properties["Street Name"],
              properties: f.properties,
              center:
                f.geometry.type === "LineString"
                  ? f.geometry.coordinates[Math.floor(f.geometry.coordinates.length / 2)]
                  : f.geometry.coordinates
            }));
        },
        zoom: 17
      });

      map.addControl(geocoder, "top-left");

      geocoder.on("result", (e) => {
        const p = e.result.properties || {};
        const center = e.result.center;

        new mapboxgl.Popup()
          .setLngLat(center)
          .setHTML(`
            <strong>${p["Street Name"] || ""}</strong><br/>
            Status: ${p["Status"] || ""}<br/>
            Recency: ${p["Recency Traffic Light"] || ""}<br/>
            Ward: ${p["Ward"] || ""}<br/>
            Constituency: ${p["Constituency"] || ""}<br/>
            Last delivery: ${p["Last Delivery Date (Display)"] || p["Last Delivery Date"] || ""}
          `)
          .addTo(map);
      });
    });
  </script>
</body>
</html>
